// MAIN APP
// ═══════════════════════════════════════════════════════════════
const App = () => {
  const [auth, setAuth] = useState(null);
  const [view, setView] = useState('workspace');
  // sessionKey increments on each login, forcing all components to remount
  // with fresh state (no stale messages, sessions, or member context from
  // the previous login). React's key prop triggers full unmount+remount.
  const [sessionKey, setSessionKey] = useState(0);
  // When a session ID is clicked in the workspace, this is set to trigger
  // CG Explorer auto-search after switching views.
  const [cgTargetSession, setCgTargetSession] = useState(null);
  // Tracks circuit breaker state for the top-bar status badge.
  // Updated by SupervisorPane via callback.
  const [systemHalted, setSystemHalted] = useState(false);
  // Session expiry message shown on the login screen after a 401
  const [sessionExpiredMsg, setSessionExpiredMsg] = useState('');

  // Listen for 401 session-expired events dispatched by apiCall.
  // Fires once regardless of which component's request triggered the 401.
  useEffect(() => {
    const handler = () => {
      setAuth(null);
      setView('workspace');
      setSessionExpiredMsg('Your session has expired. Please log in again.');
    };
    window.addEventListener('session-expired', handler);
    return () => window.removeEventListener('session-expired', handler);
  }, []);

  const navigateToCG = (sessionId) => {
    setCgTargetSession(sessionId);
    setView('cg-explorer');
  };

  const handleLogin = (authData) => {
    setAuth(authData);
    setView('workspace');
    setSessionKey(prev => prev + 1);  // force fresh component state
    setSessionExpiredMsg('');          // clear expiry message
  };

  const handleLogout = () => {
    setAuth(null);
    setView('workspace');
    // sessionKey will increment on next login
  };

  // Poll circuit breaker status for all roles (not just supervisor).
  // Must be ABOVE the conditional return — React hooks cannot be
  // called after an early return (rules of hooks).
  useEffect(() => {
    if (!auth?.access_token || DEMO_MODE) return;
    const checkStatus = async () => {
      try {
        const resp = await apiCall('GET', '/api/system/status', null, auth.access_token);
        setSystemHalted(!!resp.circuit_breaker_active);
      } catch(e) { /* ignore — badge stays as-is */ }
    };
    checkStatus();
    const interval = setInterval(checkStatus, 15000);
    return () => clearInterval(interval);
  }, [auth?.access_token]);

  if (!auth) return <LoginView onLogin={handleLogin} expiredMessage={sessionExpiredMsg}/>;

  const user = auth.user;
  const role = user?.role || '';
  const isSupervisor = role === 'CSR_SUPERVISOR';
  const isTier2OrAbove = role === 'CSR_TIER2' || isSupervisor;

  const navItems = [
    { section:'Operations', items: [
      { id:'workspace', label:'CSR Workspace', icon:'chat' },
      { id:'cg-explorer', label:'Context Graph', icon:'git' },
    ]},
    ...(isTier2OrAbove ? [{ section:'Analytics', items: [
      { id:'performance', label:'Performance', icon:'activity' },
    ]}] : []),
    ...(isSupervisor ? [{ section:'Supervision', items: [
      { id:'controls', label:'Control Pane', icon:'shield' },
      { id:'feedback', label:'Feedback Learning', icon:'brain' },
    ]}] : []),
  ];

  const viewTitles = { workspace:'CSR Workspace', controls:'Supervisor Control Pane', performance:'AI/LLM Performance Dashboard', 'cg-explorer':'Context Graph Explorer', feedback:'Feedback Learning Dashboard' };

  return (
    <div className="app-layout">
      <div className="sidebar">
        <div className="sidebar-brand">
          <h1>CSIP</h1>
          <span>Intelligence Platform</span>
        </div>
        <nav className="sidebar-nav">
          {navItems.map(sec => (
            <div className="nav-section" key={sec.section}>
              <div className="nav-section-label">{sec.section}</div>
              {sec.items.map(item => (
                <div key={item.id} className={`nav-item ${view===item.id?'active':''}`} onClick={()=>setView(item.id)}>
                  <Icon name={item.icon}/> {item.label}
                </div>
              ))}
            </div>
          ))}
        </nav>
        <div className="sidebar-user">
          <div className="sidebar-user-info">
            <div className="sidebar-avatar">{(user?.full_name||user?.username||'?')[0].toUpperCase()}</div>
            <div>
              <div className="sidebar-user-name">{user?.full_name || user?.username}</div>
              <div className="sidebar-user-role">{role}</div>
            </div>
          </div>
          <div style={{marginTop:10}}>
            <button className="btn btn-secondary btn-sm" style={{width:'100%',justifyContent:'center',fontSize:11}} onClick={handleLogout}>
              <Icon name="logout" size={14}/> Sign Out
            </button>
          </div>
        </div>
      </div>
      <div className="main-content">
        <div className="top-bar">
          <div className="top-bar-title">{viewTitles[view]}</div>
          <div className="top-bar-actions">
            <span className={`badge ${systemHalted?'badge-red':'badge-green'}`} style={{fontSize:10}}>{systemHalted ? '⛔ System Halted' : '● System Active'}</span>
            <span style={{fontSize:12,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>v2.0.0</span>
          </div>
        </div>
        <div className="content-area">
          {/* Components are always mounted but hidden via display:none so React
              state (messages, sessions, member context) survives tab switches.
              sessionKey forces full remount on login — clearing stale state. */}
          <div style={{display: view === 'workspace' ? 'block' : 'none', height:'100%'}}>
            <CSRWorkspace key={`ws-${sessionKey}`} token={auth.access_token} user={user} onNavigateToCG={navigateToCG}/>
          </div>
          <div style={{display: view === 'controls' ? 'block' : 'none'}}>
            <SupervisorPane key={`cp-${sessionKey}`} token={auth.access_token} onSystemHalted={setSystemHalted}/>
          </div>
          <div style={{display: view === 'performance' ? 'block' : 'none'}}>
            <PerformanceDashboard key={`pd-${sessionKey}`} token={auth.access_token}/>
          </div>
          <div style={{display: view === 'cg-explorer' ? 'block' : 'none'}}>
            <CGExplorer key={`cg-${sessionKey}`} token={auth.access_token} targetSession={cgTargetSession} onTargetConsumed={()=>setCgTargetSession(null)} role={role}/>
          </div>
          <div style={{display: view === 'feedback' ? 'block' : 'none'}}>
            <FeedbackDashboard key={`fb-${sessionKey}`} token={auth.access_token} role={role}/>
          </div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
