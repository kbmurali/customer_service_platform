          </div>
        </div>
      </div>

      {/* HITL Approval Queue — tabbed by category */}
      <div className="card fade-in" style={{marginBottom:24}}>
        <div className="card-header">
          <h3>Human-in-the-Loop Approval Queue</h3>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {!DEMO_MODE && <div style={{fontSize:11,color:'var(--text-muted)'}}>
              Total: {approvalCounts.requested} • <span style={{color:'var(--success)'}}>Approved: {approvalCounts.approved}</span> • <span style={{color:'var(--error)'}}>Denied: {approvalCounts.denied}</span>
            </div>}
            <span className="badge badge-yellow">{approvals.length} pending</span>
          </div>
        </div>
        {(() => {
          const TABS = [
            { id:'claims',  label:'Claims Operations',   icon:'📋', color:'#8B5CF6', tools:['update_claim_status'] },
            { id:'pa',      label:'Prior Authorization',  icon:'🔐', color:'#F59E0B', tools:['approve_prior_auth','deny_prior_auth'] },
            { id:'member',  label:'Member Operations',    icon:'👤', color:'#0EA5E9', tools:['update_member_info'] },
          ];
          const tabCounts = {};
          TABS.forEach(t => { tabCounts[t.id] = approvals.filter(a => t.tools.includes(a.tool)).length; });
          const currentTabItems = approvals.filter(a => {
            const tab = TABS.find(t => t.id === hitlTab);
            return tab ? tab.tools.includes(a.tool) : true;
          });
          const activeTab = TABS.find(t => t.id === hitlTab) || TABS[0];

          return (
            <div>
              {/* Tab bar */}
              <div style={{display:'flex',borderBottom:'1px solid var(--border)',background:'var(--bg-secondary)'}}>
                {TABS.map(tab => (
                  <div key={tab.id}
                    onClick={()=>setHitlTab(tab.id)}
                    style={{
                      padding:'10px 20px',cursor:'pointer',fontSize:13,fontWeight:hitlTab===tab.id?600:400,
                      color:hitlTab===tab.id?tab.color:'var(--text-muted)',
                      borderBottom:hitlTab===tab.id?`3px solid ${tab.color}`:'3px solid transparent',
                      display:'flex',alignItems:'center',gap:6,transition:'all 0.2s',
                      background:hitlTab===tab.id?'white':'transparent',
                    }}>
                    <span>{tab.icon}</span>
                    <span>{tab.label}</span>
                    {tabCounts[tab.id] > 0 && <span className="badge badge-yellow" style={{fontSize:10,padding:'1px 6px'}}>{tabCounts[tab.id]}</span>}
                  </div>
                ))}
              </div>

              {/* Tab content */}
              <div style={{overflow:'auto',maxHeight:450}}>
                {currentTabItems.length === 0 ? (
                  <div className="empty-state" style={{padding:32}}>
                    <div className="empty-state-desc">No pending {activeTab.label.toLowerCase()} approvals.</div>
                  </div>
                ) : (
                  <table className="data-table">
                    <thead><tr><th>Request</th><th>CSR</th><th>Tool / Details</th><th style={{width:160}}>Actions</th></tr></thead>
                    <tbody>
                      {currentTabItems.map(a => {
                        const p = a.rawParams || {};
                        let summary = a.params;
                        if (a.tool === 'update_claim_status') summary = `Claim ${(p.claim_id||'?').slice(0,20)}… → ${p.new_status||p.action||'?'} (${(p.reason||'no reason').slice(0,40)})`;
                        else if (a.tool === 'approve_prior_auth') summary = `PA ${p.pa_id||'?'} → APPROVE (${(p.reason||'').slice(0,40)})`;
                        else if (a.tool === 'deny_prior_auth') summary = `PA ${p.pa_id||'?'} → DENY (${(p.reason||'').slice(0,40)})`;
                        else if (a.tool === 'update_member_info') summary = `Member ${(p.member_id||'?').slice(0,20)}… : ${p.field||'?'} → ${(p.new_value||'?').slice(0,30)}`;
                        return (
                          <tr key={a.id}>
                            <td><span className="mono" style={{fontSize:11,wordBreak:'break-all'}}>{a.id}</span><br/><span style={{fontSize:11,color:'var(--text-muted)'}}>{a.timestamp}</span></td>
                            <td><span className="badge badge-gray">{a.csr}</span></td>
                            <td><span className="mono" style={{fontSize:12,fontWeight:500}}>{a.tool}</span><br/><span style={{fontSize:11,color:'var(--text-muted)'}}>{summary}</span></td>
                            <td>
                              <div style={{display:'flex',gap:4}}>
                                <button className="btn btn-success btn-sm" onClick={()=>handleApprove(a)} title="Approve — sends query through agent pipeline"><Icon name="check" size={12}/> Approve</button>
                                <button className="btn btn-danger btn-sm" onClick={()=>handleDeny(a)} title="Deny — marks request as denied"><Icon name="x" size={12}/> Deny</button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                )}
              </div>
            </div>
          );
        })()}
      </div>

      {/* Rate Limits */}
      <div className="card fade-in" style={{marginBottom:24}}>
          <div className="card-header"><h3>Rate Limit Utilization</h3></div>
          <div className="card-body">
            {rateLimits.length === 0 && !loading ? (
              <div className="empty-state" style={{padding:24}}><div className="empty-state-desc">No rate limit data available yet.</div></div>
            ) : rateLimits.map(r => (
              <div key={r.user} style={{marginBottom:16}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:13,fontWeight:500}}>{r.user}</span>
                  <span className="mono" style={{fontSize:12,color:'var(--text-muted)'}}>{r.current}/{r.limit} req/min</span>
                </div>
                <div style={{height:8,background:'var(--bg-secondary)',borderRadius:4,overflow:'hidden'}}>
                  <div style={{width:`${r.pct}%`,height:'100%',borderRadius:4,transition:'width 0.5s',background:r.pct>80?'var(--error)':r.pct>50?'var(--warning)':'var(--success)'}}/>
                </div>
              </div>
            ))}
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:12}}>Sliding window: 120 requests/minute per user. Source: Redis + Prometheus.</div>
          </div>
      </div>

      {/* Tool Permissions & Rate Limit Management */}
      <div className="card fade-in" style={{marginTop:24}}>
        <div className="card-header">
          <h3>Tool Permissions & Rate Limits</h3>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {permMsg && <span style={{fontSize:11,color:permMsg.includes('Failed')?'var(--error)':'var(--success)',transition:'opacity 0.3s'}}>{permMsg}</span>}
            <select value={permRole} onChange={e=>setPermRole(e.target.value)} style={{
              padding:'6px 10px',fontSize:12,borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',
              background:'white',fontFamily:'var(--font-mono)',cursor:'pointer',
            }}>
              {ROLES.map(r => <option key={r} value={r}>{r}</option>)}
            </select>
            <button className="btn btn-secondary btn-sm" onClick={fetchPermissions} disabled={permLoading}>
              {permLoading ? <span className="loading-spinner" style={{width:12,height:12,borderWidth:2}}/> : '↻'} Refresh
            </button>
          </div>
        </div>
        {(() => {
          const SERVICE_ICONS = {'Member Services':'👤','Claims Services':'📋','PA Services':'🔐','Provider Services':'🏥','Search Services':'🔍','Other':'⚙️'};
          const allTabs = orderedServices.length > 0 ? orderedServices : SERVICE_ORDER;
          const activeService = allTabs.includes(permTab) ? permTab : allTabs[0];
          const activeTools = groupedPerms[activeService] || [];

          return (
            <div>
              {/* Service tabs */}
              <div style={{display:'flex',borderBottom:'1px solid var(--border)',background:'var(--bg-secondary)',overflowX:'auto'}}>
                {allTabs.map(svc => {
                  const count = (groupedPerms[svc] || []).length;
                  const color = SERVICE_COLORS[svc] || '#6B7280';
                  const isActive = activeService === svc;
                  return (
                    <div key={svc}
                      onClick={()=>setPermTab(svc)}
                      style={{
                        padding:'10px 16px',cursor:'pointer',fontSize:12,fontWeight:isActive?600:400,
                        color:isActive?color:'var(--text-muted)',whiteSpace:'nowrap',
                        borderBottom:isActive?`3px solid ${color}`:'3px solid transparent',
                        display:'flex',alignItems:'center',gap:5,transition:'all 0.2s',
                        background:isActive?'white':'transparent',
                      }}>
                      <span>{SERVICE_ICONS[svc]||'⚙️'}</span>
                      <span>{svc.replace(' Services','')}</span>
                      {count > 0 && <span style={{fontSize:10,color:'var(--text-muted)',fontWeight:400}}>({count})</span>}
                    </div>
                  );
                })}
              </div>

              {/* Tab content */}
              <div style={{overflow:'auto'}}>
                {activeTools.length === 0 && !permLoading ? (
                  <div className="empty-state" style={{padding:24}}><div className="empty-state-desc">No tools found for {activeService} under {permRole}.</div></div>
                ) : (
                <table className="data-table">
                  <thead>
                    <tr>
                      <th style={{width:'45%'}}>Tool</th>
                      <th style={{textAlign:'center',width:70}}>Enabled</th>
                      <th style={{width:130}}>Rate Limit</th>
                    </tr>
                  </thead>
                  <tbody>
                    {activeTools.map(p => (
                      <tr key={p.tool_name}>
                        <td>
                          <div style={{display:'flex',flexDirection:'column',gap:2}}>
                            <span className="mono" style={{fontSize:12,fontWeight:500}}>{p.tool_name}</span>
                            <span style={{fontSize:11,color:'var(--text-muted)',lineHeight:1.3}}>{p.desc}</span>
                          </div>
                        </td>
                        <td style={{textAlign:'center'}}>
                          <div
                            onClick={()=>!DEMO_MODE && toggleTool(permRole, p.tool_name, p.is_allowed)}
                            style={{
                              display:'inline-flex',alignItems:'center',justifyContent:p.is_allowed?'flex-end':'flex-start',
                              width:36,height:20,borderRadius:10,cursor:DEMO_MODE?'default':'pointer',
                              background:p.is_allowed?'var(--success)':'var(--border)',transition:'background 0.2s',
                              padding:2,opacity:permSaving===`${permRole}:${p.tool_name}`?0.5:1,
                            }}>
                            <div style={{width:16,height:16,borderRadius:'50%',background:'white',boxShadow:'0 1px 2px rgba(0,0,0,0.2)',transition:'all 0.2s'}}/>
                          </div>
                        </td>
                        <td>
                          <input
                            type="number" min="1" max="1000"
                            defaultValue={p.rate_limit_per_minute}
                            onBlur={e => {
                              const v = parseInt(e.target.value, 10);
                              if (!DEMO_MODE && v !== p.rate_limit_per_minute && v >= 1 && v <= 1000) {
                                updateRateLimit(permRole, p.tool_name, v);
                              }
                            }}
                            onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }}
                            disabled={DEMO_MODE}
                            style={{
                              width:80,padding:'4px 8px',fontSize:12,fontFamily:'var(--font-mono)',
                              border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',
                              textAlign:'right',background:DEMO_MODE?'var(--bg-secondary)':'white',
                            }}
                          />
                          <span style={{fontSize:10,color:'var(--text-muted)',marginLeft:4}}>/min</span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                )}
              </div>
            </div>
          );
        })()}
        <div style={{padding:'8px 16px',fontSize:11,color:'var(--text-muted)',borderTop:'1px solid var(--border)'}}>
          Toggle tools on/off or edit rate limits. Changes take effect immediately across all containers (Redis cache invalidation). Source: MySQL tool_permissions table.
        </div>
      </div>

      {/* ── Approval Modal Overlay ─────────────────────────────────── */}
      {approvalModal && (
        <div style={{
          position:'fixed', top:0, left:0, right:0, bottom:0, zIndex:9999,
          background:'rgba(0,0,0,0.5)', backdropFilter:'blur(2px)',
          display:'flex', alignItems:'center', justifyContent:'center',
        }}>
          <div style={{
            background:'white', borderRadius:'var(--radius-lg)', padding:28,
            width:'100%', maxWidth:520, boxShadow:'0 20px 60px rgba(0,0,0,0.3)',
          }}>
            {/* Phase: Capture Reason */}
            {approvalModal.phase === 'reason' && (() => {
              const a = approvalModal.approval;
              const p = a.rawParams || {};
              const TOOL_LABELS = {
                update_claim_status: { label:'Approve Claim Status Update', icon:'📋', color:'#8B5CF6',
                  detail:`Claim: ${p.claim_id||'?'}\nNew Status: ${p.new_status||p.action||'APPROVED'}` },
                approve_prior_auth: { label:'Approve Prior Authorization', icon:'🔐', color:'#F59E0B',
                  detail:`PA: ${p.pa_id||'?'}` },
                deny_prior_auth: { label:'Deny Prior Authorization', icon:'🔐', color:'#F59E0B',
                  detail:`PA: ${p.pa_id||'?'}` },
                update_member_info: { label:'Approve Member Update', icon:'👤', color:'#0EA5E9',
                  detail:`Member: ${p.member_id||'?'}\nField: ${p.field||'?'} → ${p.new_value||'?'}` },
              };
              const info = TOOL_LABELS[a.tool] || { label:`Approve: ${a.tool}`, icon:'⚙️', color:'#6B7280', detail:JSON.stringify(p) };
              return (
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
                    <span style={{fontSize:24}}>{info.icon}</span>
                    <div>
                      <div style={{fontWeight:700,fontSize:16,color:info.color}}>{info.label}</div>
                      <div style={{fontSize:12,color:'var(--text-muted)'}}>Requested by: {a.csr} at {a.timestamp}</div>
                    </div>
                  </div>
                  <div className="mono" style={{fontSize:12,background:'var(--bg-secondary)',padding:12,borderRadius:'var(--radius-sm)',whiteSpace:'pre-wrap',marginBottom:16,lineHeight:1.5}}>
                    {info.detail}
                  </div>
                  <div style={{marginBottom:16}}>
                    <label style={{fontSize:13,fontWeight:600,display:'block',marginBottom:6}}>Approval Reason <span style={{color:'var(--text-muted)',fontWeight:400}}>(required)</span></label>
                    <textarea
                      rows={3}
                      placeholder="Enter the reason for approval..."
                      value={approvalModal.reason||''}
                      onChange={e => setApprovalModal(prev => ({...prev, reason:e.target.value}))}
                      autoFocus
                      style={{
                        width:'100%', padding:'10px 12px', fontSize:13, border:'1px solid var(--border)',
                        borderRadius:'var(--radius-sm)', resize:'vertical', fontFamily:'inherit',
                        boxSizing:'border-box',
                      }}
                    />
                  </div>
                  <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                    <button className="btn btn-secondary" onClick={()=>setApprovalModal(null)} style={{padding:'8px 20px'}}>Cancel</button>
                    <button className="btn btn-success" onClick={executeApproval}
                      disabled={!(approvalModal.reason||'').trim()}
                      style={{padding:'8px 20px',opacity:(approvalModal.reason||'').trim()?1:0.5}}>
                      <Icon name="check" size={14}/> Approve & Execute
                    </button>
                  </div>
                </div>
              );
            })()}

            {/* Phase: Executing (spinner) */}
            {approvalModal.phase === 'executing' && (
              <div style={{textAlign:'center',padding:'20px 0'}}>
                <div style={{
                  width:48,height:48,border:'4px solid var(--border)',borderTopColor:'var(--accent)',
                  borderRadius:'50%',animation:'spin 0.8s linear infinite',margin:'0 auto 20px',
                }}/>
                <div style={{fontWeight:600,fontSize:15,marginBottom:8}}>Processing Approval</div>
                <div style={{fontSize:13,color:'var(--text-muted)',lineHeight:1.5}}>
                  {approvalModal.message}
                </div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:12}}>
                  This may take up to 60 seconds. Please do not close this window.
                </div>
              </div>
            )}

            {/* Phase: Done (success or error) */}
            {approvalModal.phase === 'done' && (
              <div style={{textAlign:'center',padding:'12px 0'}}>
                <div style={{fontSize:48,marginBottom:12}}>
                  {approvalModal.error ? '❌' : '✅'}
                </div>
                <div style={{fontWeight:700,fontSize:16,marginBottom:12,color:approvalModal.error?'var(--error)':'var(--success)'}}>
                  {approvalModal.error ? 'Approval Failed' : 'Approval Successful'}
                </div>
                <div style={{
                  fontSize:13,color:'var(--text-secondary)',lineHeight:1.6,
                  whiteSpace:'pre-wrap',textAlign:'left',
                  background:'var(--bg-secondary)',padding:14,borderRadius:'var(--radius-sm)',
                  maxHeight:200,overflow:'auto',marginBottom:20,
                }}>
                  {approvalModal.message}
                </div>
                <button className="btn btn-primary" onClick={()=>setApprovalModal(null)} style={{padding:'8px 32px'}}>
                  Close
                </button>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// PERFORMANCE DASHBOARD
// ═══════════════════════════════════════════════════════════════
const PerformanceDashboard = ({ token }) => {
  const [loading, setLoading] = useState(!DEMO_MODE);
  const [agenticHealth, setAgenticHealth] = useState({});
  const [latencyData, setLatencyData] = useState([]);
  const [securityData, setSecurityData] = useState([]);
  const [teamData, setTeamData] = useState([]);
  const [providers, setProviders] = useState([]);
  const [toolUsageData, setToolUsageData] = useState([]);

  // Demo data
  const demoHealth = {
    estimated_tokens_per_query:1850, llm_calls_per_query:5.3, tool_success_rate:0.941,
    planning_routing_accuracy:0.923, positive_feedback_rate:0.873,
    agent_error_rate:0.047, avg_agent_latency_seconds:1.2, avg_e2e_latency_seconds:4.2,
    avg_plan_goals:1.1, avg_plan_steps:1.8,
  };
  const demoLatency = [{t:'12:00',v:4.2},{t:'12:05',v:3.8},{t:'12:10',v:5.1},{t:'12:15',v:4.5},{t:'12:20',v:3.9},{t:'12:25',v:4.8},{t:'12:30',v:4.1},{t:'12:35',v:3.6},{t:'12:40',v:5.3},{t:'12:45',v:4.0},{t:'12:50',v:3.7},{t:'12:55',v:4.4}];
  const demoSecurity = [
    {name:'NeMo Blocks',count:23},{name:'RBAC Denials',count:5},{name:'Rate Limited',count:12},
    {name:'NH3 Sanitized',count:89},{name:'Presidio Vaulted',count:156},{name:'Output Validation',count:3},
    {name:'Approval Requests',count:7},{name:'Replay Rejected',count:0},
  ];
  const demoTeams = [{name:'Member',count:2100},{name:'Claims',count:3200},{name:'PA',count:2800},{name:'Provider',count:1900},{name:'Search',count:1500}];
  const demoProviders = [
    {name:'Neo4j',status:'active',failures:0,lastSuccess:'via /health',avgMs:0},
    {name:'MySQL',status:'active',failures:0,lastSuccess:'via /health',avgMs:0},
    {name:'Redis',status:'active',failures:0,lastSuccess:'via /health',avgMs:0},
    {name:'Chroma',status:'active',failures:0,lastSuccess:'via /health',avgMs:0},
    {name:'LangFuse',status:'active',failures:0,lastSuccess:'via /health',avgMs:0},
  ];
  const serviceColors = {
    'Member Services':'#3B82F6','Claims Services':'#8B5CF6','PA Services':'#F59E0B',
    'Provider Services':'#10B981','Search Services':'#EC4899','Other':'#94A3B8',
  };
  const demoToolUsage = [
    {tool:'claim_lookup',count:1240,service:'Claims Services'},
    {tool:'claim_status',count:980,service:'Claims Services'},
    {tool:'member_lookup',count:860,service:'Member Services'},
    {tool:'check_eligibility',count:720,service:'Member Services'},
    {tool:'provider_network_check',count:650,service:'Provider Services'},
    {tool:'pa_status',count:580,service:'PA Services'},
    {tool:'search_policy_info',count:540,service:'Search Services'},
    {tool:'coverage_lookup',count:480,service:'Member Services'},
    {tool:'claim_payment_info',count:420,service:'Claims Services'},
    {tool:'pa_requirements',count:390,service:'PA Services'},
    {tool:'provider_lookup',count:340,service:'Provider Services'},
    {tool:'search_medical_codes',count:310,service:'Search Services'},
    {tool:'member_claims',count:280,service:'Claims Services'},
    {tool:'pa_lookup',count:260,service:'PA Services'},
    {tool:'provider_search_by_specialty',count:220,service:'Provider Services'},
    {tool:'search_knowledge_base',count:190,service:'Search Services'},
    {tool:'member_prior_authorizations',count:170,service:'PA Services'},
    {tool:'member_policy_lookup',count:150,service:'Member Services'},
    {tool:'update_claim_status',count:45,service:'Claims Services'},
    {tool:'update_member_info',count:38,service:'Member Services'},
    {tool:'approve_prior_auth',count:22,service:'PA Services'},
    {tool:'deny_prior_auth',count:12,service:'PA Services'},
  ];

  useEffect(() => {
    if (DEMO_MODE) {
      setAgenticHealth(demoHealth); setLatencyData(demoLatency); setSecurityData(demoSecurity);
      setTeamData(demoTeams); setProviders(demoProviders); setToolUsageData(demoToolUsage);
      return;
    }
    const fetchData = async () => {
      setLoading(true);
      try {
        // Agentic health metrics from consolidated API endpoint
        try {
          const healthData = await apiCall('GET', '/api/stats/agentic-health', null, token);
          if (healthData.metrics) setAgenticHealth(healthData.metrics);
        } catch(e) { console.warn('Agentic health fetch failed:', e); }

        // Latency time series (last hour, 5-min steps)
        const latRange = await promRangeQuery(
          'rate(request_processing_latency_seconds_sum[15m]) / rate(request_processing_latency_seconds_count[15m])', 60, 300
        );
        if (latRange && latRange.length > 0 && latRange[0].values) {
          setLatencyData(latRange[0].values
            .map(([ts, val]) => ({
              t: new Date(ts * 1000).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
              v: parseFloat(parseFloat(val).toFixed(2)) || 0,
            }))
            .filter(d => isFinite(d.v) && d.v > 0)
          );
        }

        // Security controls heatmap from Prometheus counters (sum across labels)
        const secQueries = [
          ['NeMo Blocks', 'sum(increase(input_validation_failures_total[24h]))'],
          ['RBAC Denials', 'sum(increase(authorization_denials_total[24h]))'],
          ['Rate Limited', 'sum(increase(rate_limit_exceeded_total[24h]))'],
          ['NH3 Sanitized', 'sum(increase(malicious_patterns_detected_total[24h]))'],
          ['Presidio Vaulted', 'sum(increase(anonymization_operations_total[24h]))'],
          ['Output Validation', 'sum(increase(tool_execution_denials_total[24h]))'],
          ['Approval Requests', 'sum(increase(approval_requests_total[24h]))'],
          ['Replay Rejected', 'sum(increase(mcp_replay_rejections_total[24h]))'],
        ];
        const secResults = await Promise.all(secQueries.map(([_,q]) => promQuery(q)));
        const secData = secQueries.map(([name], i) => ({name, count: Math.round(promValue(secResults[i]))}));

        // Override "Approval Requests" with MySQL data — Prometheus counters for
        // approvals are unreliable (they're in A2A containers which aren't scraped)
        if (token) {
          try {
            const aqData = await apiCall('GET', '/api/admin/approval-queue', null, token);
            const approvalIdx = secData.findIndex(s => s.name === 'Approval Requests');
            if (approvalIdx >= 0) secData[approvalIdx].count = (aqData.counts?.total || 0);
          } catch(e) { /* supervisor-only endpoint — may fail for non-supervisor roles */ }
        }
        setSecurityData(secData);

        // Team execution data from Context Graph (Prometheus counter is dead code)
        try {
          const teamResp = await apiCall('GET', '/api/stats/team-invocations', null, token);
          if (teamResp.teams?.length > 0) {
            setTeamData(teamResp.teams);
          }
        } catch(e) { console.warn('Team invocations fetch failed:', e); }

        // Infrastructure service health from /health endpoint
        try {
          const healthRes = await fetch(`${API_BASE}/health`);
          if (healthRes.ok) {
            const health = await healthRes.json();
            const services = health.services || {};
            setProviders(Object.entries(services).map(([name, status]) => ({
              name: name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()),
              status: status === 'connected' ? 'active' : 'broken',
              failures: 0,
              lastSuccess: status === 'connected' ? 'via /health' : 'unavailable',
              avgMs: 0,
            })));
          }
        } catch(e) { /* /health not reachable */ }

        // Tool usage: per-tool invocation counts from CG via API (consistent with team-invocations)
        try {
          const toolResp = await apiCall('GET', '/api/stats/tool-usage', null, token);
          if (toolResp.tools?.length > 0) {
            setToolUsageData(toolResp.tools);
          }
        } catch(e) {
          // Fallback: query Prometheus directly if API endpoint unavailable
          console.warn('Tool usage API failed, falling back to Prometheus:', e);
          try {
            const toolResult = await promQuery('sum by (tool_name) (increase(tool_executions_total[24h]))');
            if (toolResult && toolResult.length > 0) {
              let catalog = {};
              try {
                const catResp = await apiCall('GET', '/api/admin/tool-catalog', null, token);
                catalog = catResp.catalog || {};
              } catch(ce) { /* catalog not available */ }

              const toolData = toolResult
                .map(r => ({
                  tool: r.metric?.tool_name || 'unknown',
                  count: Math.round(parseFloat(r.value?.[1] || 0)),
                  service: catalog[r.metric?.tool_name]?.service || 'Other',
                }))
                .filter(d => d.count > 0)
                .sort((a, b) => b.count - a.count);
              if (toolData.length > 0) setToolUsageData(toolData);
            }
          } catch(pe) { console.warn('Prometheus tool usage also failed:', pe); }
        }
      } catch(e) { console.error('PerformanceDashboard fetch error:', e); }
      setLoading(false);
    };
    fetchData();
    const interval = setInterval(fetchData, 30000);
    return () => clearInterval(interval);
  }, []);

  const maxSec = Math.max(...securityData.map(d=>d.count), 1);
  const h = agenticHealth;
  const fmtPct = (v) => (v && v > 0) ? (v * 100).toFixed(1) + '%' : '--';
  const fmtSec = (v) => (v && v > 0) ? v.toFixed(1) + 's' : '--';
  const fmtNum = (v) => (v && v > 0) ? v.toFixed(1) : '--';
  const fmtTokenCost = (tokens) => (tokens && tokens > 0) ? '$' + (tokens * 0.000003).toFixed(4) : '--';
  const pctColor = (v, good=0.9) => v >= good ? 'var(--success)' : v >= good*0.8 ? 'var(--warning)' : 'var(--error)';
  const pctColorInv = (v, bad=0.1) => v <= bad ? 'var(--success)' : v <= bad*2 ? 'var(--warning)' : 'var(--error)';

  return (
    <div style={{maxWidth:1200,margin:'0 auto'}}>
      {loading && <div style={{textAlign:'center',padding:24}}><span className="loading-spinner"/> Loading agentic health metrics...</div>}

      {/* Tier 1: LLM & Cost Metrics */}
      <div className="card fade-in" style={{marginBottom:24}}>
        <div className="card-header">
          <h3>Tier 1 — LLM Performance & Cost</h3>
          <span className="badge badge-gray" style={{fontSize:10}}>Updated every 30s from Context Graph</span>
        </div>
        <div className="metric-grid">
          {[
            { label:'Est. Tokens / Query', value:fmtNum(h.estimated_tokens_per_query), sub:fmtTokenCost(h.estimated_tokens_per_query), color:'#0EA5E9' },
            { label:'LLM Calls / Query', value:fmtNum(h.llm_calls_per_query), sub:'Agent executions per session', color:'#8B5CF6' },
            { label:'Tool Success Rate', value:fmtPct(h.tool_success_rate), sub:`${h.tool_success_rate > 0 ? Math.round(h.tool_success_rate*200)+'/200' : '--'} recent tools`, color:pctColor(h.tool_success_rate||0,0.9) },
            { label:'Planning Accuracy', value:fmtPct(h.planning_routing_accuracy), sub:'Correct routing to team/tool', color:pctColor(h.planning_routing_accuracy||0,0.9) },
            { label:'Positive Feedback', value:fmtPct(h.positive_feedback_rate), sub:'CSR satisfaction (7-day)', color:pctColor(h.positive_feedback_rate||0,0.8) },
            { label:'E2E Latency', value:fmtSec(h.avg_e2e_latency_seconds), sub:'Session start → plan complete', color: (h.avg_e2e_latency_seconds||0) < 10 ? 'var(--success)' : (h.avg_e2e_latency_seconds||0) < 20 ? 'var(--warning)' : 'var(--error)' },
          ].map(m => (
            <div className="metric-card" key={m.label}>
              <div className="metric-label">{m.label}</div>
              <div className="metric-value" style={{color:m.color}}>{m.value}</div>
              {m.sub && <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>{m.sub}</div>}
            </div>
          ))}
        </div>
      </div>

      {/* Tier 2: Agent Health & Drift */}
      <div className="card fade-in" style={{marginBottom:24}}>
        <div className="card-header">
          <h3>Tier 2 — Agent Health & Drift Detection</h3>
          <span className="badge badge-gray" style={{fontSize:10}}>Rolling window over last 200 executions</span>
        </div>
        <div className="metric-grid">
          {[
            { label:'Agent Error Rate', value:fmtPct(h.agent_error_rate), sub:'Executions with errors or failures', color:pctColorInv(h.agent_error_rate||0,0.05) },
            { label:'Avg Agent Latency', value:h.avg_agent_latency_seconds > 0 ? (h.avg_agent_latency_seconds*1000).toFixed(0)+'ms' : '--', sub:'Team supervisor routing time', color:'#0EA5E9' },
            { label:'Avg Goals / Plan', value:fmtNum(h.avg_plan_goals), sub:'Drift signal: should be ~1.0', color: Math.abs((h.avg_plan_goals||1)-1) < 0.3 ? 'var(--success)' : 'var(--warning)' },
            { label:'Avg Steps / Plan', value:fmtNum(h.avg_plan_steps), sub:'Drift signal: should be 1-3', color: (h.avg_plan_steps||0) <= 3 ? 'var(--success)' : 'var(--warning)' },
          ].map(m => (
            <div className="metric-card" key={m.label}>
              <div className="metric-label">{m.label}</div>
              <div className="metric-value" style={{color:m.color}}>{m.value}</div>
              {m.sub && <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>{m.sub}</div>}
            </div>
          ))}
        </div>
      </div>

      <div className="grid-2" style={{marginBottom:24}}>
        <div className="card fade-in">
          <div className="card-header"><h3>Request Latency (last hour)</h3></div>
          <div className="card-body" style={{height:220}}>
            {latencyData.length > 0 ? (
            <ResponsiveContainer width="100%" height="100%">
              <LineChart data={latencyData}>
                <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/>
                <XAxis dataKey="t" tick={{fontSize:11,fill:'#94A3B8'}} axisLine={{stroke:'#E2E8F0'}}/>
                <YAxis tick={{fontSize:11,fill:'#94A3B8'}} axisLine={{stroke:'#E2E8F0'}} unit="s"/>
                <Tooltip contentStyle={{fontSize:12,borderRadius:8,border:'1px solid #E2E8F0'}}/>
                <Line type="monotone" dataKey="v" stroke="#0EA5E9" strokeWidth={2} dot={false} name="Latency"/>
              </LineChart>
            </ResponsiveContainer>
            ) : !loading && <div className="empty-state" style={{padding:24}}><div className="empty-state-desc">No latency data available yet. Send some queries first.</div></div>}
          </div>
        </div>
        <div className="card fade-in">
          <div className="card-header"><h3>Security Controls (last 24h)</h3></div>
          <div className="card-body">
            {securityData.map(d => (
              <div className="heatmap-bar" key={d.name}>
                <div className="heatmap-label">{d.name}</div>
                <div className="heatmap-track">
                  <div className={`heatmap-fill ${d.count/maxSec>0.5?'high':d.count/maxSec>0.15?'med':'low'}`} style={{width:`${Math.max((d.count/maxSec)*100,d.count>0?18:0)}%`}}>{d.count}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="grid-2">
        <div className="card fade-in">
          <div className="card-header"><h3>Agent Invocations by Team</h3></div>
          <div className="card-body" style={{height:240}}>
            {teamData.length > 0 ? (
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={teamData} layout="vertical">
                <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0"/>
                <XAxis type="number" tick={{fontSize:11,fill:'#94A3B8'}}/>
                <YAxis type="category" dataKey="name" tick={{fontSize:12,fill:'#475569'}} width={70}/>
                <Tooltip contentStyle={{fontSize:12,borderRadius:8}}/>
                <Bar dataKey="count" fill="#0EA5E9" radius={[0,4,4,0]} name="Total Invocations"/>
              </BarChart>
            </ResponsiveContainer>
            ) : !loading && <div className="empty-state" style={{padding:24}}><div className="empty-state-desc">No agent invocation data yet.</div></div>}
          </div>
        </div>
        <div className="card fade-in">
          <div className="card-header"><h3>Infrastructure Health</h3></div>
          <div className="card-body">
            {providers.length > 0 ? providers.map(p => (
              <div className="provider-card" key={p.name}>
                <div className={`provider-dot ${p.status}`}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600}}>{p.name}</div>
                  <div style={{fontSize:12,color:'var(--text-muted)'}}>{p.status==='active'?'Active':p.status==='cooldown'?'Cooldown':'Unavailable'} {p.lastSuccess ? `• ${p.lastSuccess}` : ''} {p.avgMs ? `• Avg: ${p.avgMs}ms` : ''}</div>
                </div>
                <span className={`badge ${p.status==='active'?'badge-green':p.status==='cooldown'?'badge-yellow':'badge-red'}`}>
                  {p.failures} failures
                </span>
              </div>
            )) : !loading && <div className="empty-state" style={{padding:16}}><div className="empty-state-desc">Provider status unavailable.</div></div>}
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:12}}>Service health polled from the API gateway /health endpoint every 30 seconds.</div>
          </div>
        </div>
      </div>

      {/* Tool Usage Heatmap — per-tool invocation counts colored by service */}
      <div className="card fade-in" style={{marginTop:24}}>
        <div className="card-header">
          <h3>Tool Usage Across All Agents (last 24h)</h3>
          <span className="badge badge-gray" style={{fontSize:10}}>22 tools × 5 service teams</span>
        </div>
        <div className="card-body" style={{padding:'16px 20px'}}>
          {toolUsageData.length > 0 ? (() => {
            const maxCount = Math.max(...toolUsageData.map(d => d.count), 1);
            return toolUsageData.map(d => (
              <div key={d.tool} style={{display:'flex',alignItems:'center',marginBottom:6,gap:8}}>
                <div style={{width:200,fontSize:12,fontFamily:'monospace',color:'var(--text-primary)',textAlign:'right',flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={d.tool}>{d.tool}</div>
                <div style={{flex:1,background:'var(--bg-secondary)',borderRadius:4,height:20,position:'relative',overflow:'hidden'}}>
                  <div style={{
                    width:`${Math.max((d.count/maxCount)*100, d.count > 0 ? 3 : 0)}%`,
                    height:'100%',
                    background: serviceColors[d.service] || '#94A3B8',
                    borderRadius:4,
                    transition:'width 0.5s ease',
                    display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:6,
                  }}>
                    {(d.count/maxCount) > 0.12 && <span style={{fontSize:10,color:'#fff',fontWeight:600}}>{d.count.toLocaleString()}</span>}
                  </div>
                  {(d.count/maxCount) <= 0.12 && <span style={{position:'absolute',left:`${Math.max((d.count/maxCount)*100,3)+1}%`,top:2,fontSize:10,color:'var(--text-muted)'}}>{d.count}</span>}
                </div>
                <div style={{width:110,fontSize:11,color:serviceColors[d.service]||'var(--text-muted)',flexShrink:0,textAlign:'left'}}>{d.service}</div>
              </div>
            ));
          })() : !loading && <div className="empty-state" style={{padding:24}}><div className="empty-state-desc">No tool execution data yet. Send some queries first.</div></div>}
          {toolUsageData.length > 0 && (
            <div style={{display:'flex',gap:16,marginTop:16,paddingTop:12,borderTop:'1px solid var(--border)',flexWrap:'wrap'}}>
              {Object.entries(serviceColors).filter(([k]) => k !== 'Other').map(([name, color]) => (
                <div key={name} style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'var(--text-muted)'}}>
                  <div style={{width:10,height:10,borderRadius:2,background:color}}/> {name}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// CONTEXT GRAPH EXPLORER
// ═══════════════════════════════════════════════════════════════
const CGExplorer = ({ token, targetSession, onTargetConsumed, role }) => {
  const [searchId, setSearchId] = useState('');

  // Auto-search when navigated from workspace with a target session
  useEffect(() => {
    if (targetSession) {
      _triggerSearch(targetSession);
      if (onTargetConsumed) onTargetConsumed();
    }
  }, [targetSession]);
  const [selectedSession, setSelectedSession] = useState(null);
  const [cgTrees, setCgTrees] = useState({});
  const [followUpChain, setFollowUpChain] = useState([]);
  const chainScrollRef = useRef(null);
  const [removingExperience, setRemovingExperience] = useState(false);
  const [removeResult, setRemoveResult] = useState(null); // {success:bool, msg:string}

  const handleRemoveExperience = async (sessionId) => {
    if (!confirm(`Remove experience for session ${sessionId} from the Experience Store? This cannot be undone.`)) return;
    setRemovingExperience(true);
    setRemoveResult(null);
    try {
      const resp = await apiCall('DELETE', `/api/experience/${sessionId}`, null, token);
      if (resp.deleted) {
        setRemoveResult({success:true, msg:'Experience removed successfully.'});
      } else {
        setRemoveResult({success:false, msg:'Experience not found in store.'});
      }
    } catch (exc) {
      setRemoveResult({success:false, msg:`Failed: ${exc.message || exc}`});
    }
    setRemovingExperience(false);
    setTimeout(() => setRemoveResult(null), 5000);
  };

  // Demo CG trees — one per session in the chain, each with different content
  const demoCGTrees = {
    'sess-prev-001': {
      type:'Session', id:'sess-prev-001', status:'completed', props:{userId:'CSR_001',timestamp:'2026-03-20T14:10:00Z',rootSessionId:'sess-prev-001',chainDepth:0},
      children: [{
        type:'Plan', id:'plan-001', status:'completed', props:{planType:'central',totalGoals:1},
        children: [{
          type:'Goal', id:'goal_1', status:'completed', props:{description:'Find claim filed on Feb 14',priority:1},
          children: [{
            type:'Step', id:'step_1', status:'completed', props:{agent:'claims_services_team',order:1},
            children: [{
              type:'AgentExecution', id:'exec-cs-001', status:'completed', props:{agentName:'claims_services_supervisor',durationMs:2400},
              children: [{
                type:'AgentExecution', id:'exec-wk-001', status:'completed', props:{agentName:'claim_lookup_worker',durationMs:1600},
                children: [{
                  type:'ToolExecution', id:'tool-001', status:'completed', props:{toolName:'claim_lookup',durationMs:380,inputData:'serviceDate=2026-02-14',outputData:'CLM-123456'},
                  children:[]
                }]
              }]
            }]
          }]
        }]
      }]
    },
    'sess-demo-001': {
      type:'Session', id:'sess-demo-001', status:'completed', props:{userId:'CSR_001',timestamp:'2026-03-20T14:23:01Z',rootSessionId:'sess-prev-001',chainDepth:1},
      children: [{
        type:'Plan', id:'plan-abc', status:'completed', props:{planType:'central',totalGoals:1},
        children: [{
          type:'Goal', id:'goal_1', status:'completed', props:{description:'Check claim status',priority:1},
          children: [{
            type:'Step', id:'step_1', status:'completed', props:{agent:'claims_services_team',order:1},
            children: [{
              type:'AgentExecution', id:'exec-central-01', status:'completed', props:{agentName:'central_supervisor',durationMs:1250},
              children: [{
                type:'AgentExecution', id:'exec-claims-01', status:'completed', props:{agentName:'claims_services_supervisor',durationMs:2100},
                children: [{
                  type:'AgentExecution', id:'exec-worker-01', status:'completed', props:{agentName:'claim_status_worker',durationMs:1800},
                  children: [{
                    type:'ToolExecution', id:'tool-01', status:'completed', props:{toolName:'claim_status',durationMs:450,inputData:'CLM-123456',outputData:'UNDER_REVIEW'},
                    children:[]
                  }]
                }]
              }]
            }]
          }]
        }]
      }]
    },
    'sess-demo-002': {
      type:'Session', id:'sess-demo-002', status:'completed', props:{userId:'CSR_001',timestamp:'2026-03-20T14:25:30Z',rootSessionId:'sess-prev-001',chainDepth:2},
      children: [{
        type:'Plan', id:'plan-xyz', status:'completed', props:{planType:'central',totalGoals:2},
        children: [{
          type:'Goal', id:'goal_1', status:'completed', props:{description:'Retrieve claim denial details',priority:1},
          children: [{
            type:'Step', id:'step_1', status:'completed', props:{agent:'claims_services_team',order:1},
            children: [{
              type:'AgentExecution', id:'exec-cs-002', status:'completed', props:{agentName:'claims_services_supervisor',durationMs:2800},
              children: [{
                type:'AgentExecution', id:'exec-wk-002', status:'completed', props:{agentName:'claim_status_worker',durationMs:1500},
                children: [{
                  type:'ToolExecution', id:'tool-002', status:'completed', props:{toolName:'claim_status',durationMs:320,inputData:'CLM-123456',outputData:'UNDER_REVIEW: pending medical records'},
                  children:[]
                }]
              }]
            }]
          }],
        },{
          type:'Goal', id:'goal_2', status:'completed', props:{description:'Look up review policy timeline',priority:2},
          children: [{
            type:'Step', id:'step_2', status:'completed', props:{agent:'search_services_team',order:2},
            children: [{
              type:'AgentExecution', id:'exec-ss-001', status:'completed', props:{agentName:'search_services_supervisor',durationMs:1900},
              children: [{
                type:'AgentExecution', id:'exec-wk-003', status:'completed', props:{agentName:'search_policy_info_worker',durationMs:1200},
                children: [{
                  type:'ToolExecution', id:'tool-003', status:'completed', props:{toolName:'search_policy_info',durationMs:280,inputData:'claim review timeline policy',outputData:'30 business days per policy 4.2.1'},
                  children:[]
                }]
              }]
            }]
          }]
        }]
      }]
    },
    'sess-demo-003': {
      type:'Session', id:'sess-demo-003', status:'failed', props:{userId:'CSR_001',timestamp:'2026-03-20T14:28:15Z',rootSessionId:'sess-prev-001',chainDepth:3},
      children: [{
        type:'Plan', id:'plan-fail', status:'failed', props:{planType:'central',totalGoals:1},
        children: [{
          type:'Goal', id:'goal_1', status:'failed', props:{description:'Escalate claim for supervisor review',priority:1},
          children: [{
            type:'Step', id:'step_1', status:'failed', props:{agent:'claims_services_team',order:1},
            children: [{
              type:'AgentExecution', id:'exec-fail-01', status:'failed', props:{agentName:'claims_services_supervisor',durationMs:3500},
              children: [{
                type:'AgentExecution', id:'exec-fail-wk', status:'failed', props:{agentName:'update_claim_status_worker',durationMs:2200},
                children: [{
                  type:'ToolExecution', id:'tool-fail', status:'pending', props:{toolName:'update_claim_status',durationMs:0,inputData:'CLM-123456 → ESCALATED',outputData:'PENDING_APPROVAL'},
                  children:[]
                }]
              }]
            }]
          }]
        }]
      }]
    },
  };

  const demoFollowUpChain = [
    { id:'sess-prev-001', depth:0, query:'What claim was filed on Feb 14?', timestamp:'14:10' },
    { id:'sess-demo-001', depth:1, query:'What is the status of claim CLM-123456?', timestamp:'14:23' },
    { id:'sess-demo-002', depth:2, query:'Why is it still under review?', timestamp:'14:25' },
    { id:'sess-demo-003', depth:3, query:'Escalate this to a supervisor', timestamp:'14:28' },
  ];

  const [searchError, setSearchError] = useState('');
  const [searching, setSearching] = useState(false);

  // Core search function — can be called with explicit ID or uses searchId state
  const _triggerSearch = async (explicitId) => {
    const sid = (explicitId || searchId || '').trim();
    if (!sid) return;
    if (explicitId) setSearchId(sid);
    setSearchError('');
    setSearching(true);

    if (DEMO_MODE) {
      setCgTrees(demoCGTrees);
      setFollowUpChain(demoFollowUpChain);
      const match = demoFollowUpChain.find(s => s.id === sid);
      setSelectedSession(match ? match.id : demoFollowUpChain[0].id);
      if (!match) setSearchError('Session not found in demo data. Showing demo follow-up chain instead. Try: sess-prev-001, sess-demo-001, sess-demo-002, or sess-demo-003.');
      setSearching(false);
      return;
    }

    try {
      const data = await apiCall('GET', `/api/cg/session/${encodeURIComponent(sid)}`, null, token);

      // Build follow-up chain from response
      const chain = (data.follow_up_chain || []).map(s => ({
        id: s.sessionId,
        depth: s.depth || s.chainDepth || 0,
        query: s.query || s.sessionId,
        timestamp: s.startTime ? new Date(s.startTime).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '',
        status: s.planStatus || s.status || 'unknown',
      }));

      if (chain.length === 0) {
        // Single session with no chain — show just this one
        chain.push({
          id: sid,
          depth: 0,
          query: data.session?.metadata?.query || sid,
          timestamp: data.session?.startTime ? new Date(data.session.startTime).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '',
          status: data.session?.status || 'unknown',
        });
      }

      setFollowUpChain(chain);

      // Set the tree for the searched session
      const trees = {};
      trees[sid] = data.tree || {type:'Session', id:sid, status:'unknown', props:{}, children:[]};
      setCgTrees(trees);
      setSelectedSession(sid);

    } catch(e) {
      const msg = e.message || '';
      if (msg.includes('404')) {
        setSearchError(`Session "${sid}" not found in the Context Graph.`);
      } else {
        setSearchError(`Failed to load Context Graph: ${msg}. Verify the stack is running.`);
      }
      setCgTrees({});
      setFollowUpChain([]);
      setSelectedSession(null);
    }
    setSearching(false);
  };

  const handleSearch = () => _triggerSearch();

  const selectSession = async (sessionId) => {
    setSelectedSession(sessionId);
    setTimeout(() => {
      const el = document.getElementById(`chain-${sessionId}`);
      if (el) el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
    }, 50);

    // Lazy-load tree for this session if not already fetched
    if (!cgTrees[sessionId] && !DEMO_MODE && token) {
      try {
        const data = await apiCall('GET', `/api/cg/session/${encodeURIComponent(sessionId)}`, null, token);
        setCgTrees(prev => ({...prev, [sessionId]: data.tree || {type:'Session', id:sessionId, status:'unknown', props:{}, children:[]}}));
      } catch(e) {
        setCgTrees(prev => ({...prev, [sessionId]: {type:'Session', id:sessionId, status:'error', props:{error:e.message}, children:[]}}));
      }
    }
  };

  const scrollChain = (direction) => {
    if (chainScrollRef.current) {
      chainScrollRef.current.scrollBy({left: direction * 260, behavior:'smooth'});
    }
  };

  const currentTree = cgTrees[selectedSession];
  const currentChainItem = followUpChain.find(s => s.id === selectedSession);
  const currentIndex = followUpChain.findIndex(s => s.id === selectedSession);

  const TreeNode = ({ node, depth=0 }) => {
    const [expanded, setExpanded] = useState(depth < 4);
    const typeColors = { Session:'#0EA5E9', Plan:'#8B5CF6', Goal:'#F59E0B', Step:'#10B981', AgentExecution:'#EC4899', ToolExecution:'#EF4444', ToolError:'#DC2626', AgentError:'#DC2626' };
    const hasChildren = node.children?.length > 0;
    return (
      <div>
        <div className={`cg-tree-node status-${node.status}`} onClick={()=>hasChildren&&setExpanded(!expanded)} style={{borderLeftColor:typeColors[node.type]||'var(--border)',cursor:hasChildren?'pointer':'default'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              {hasChildren && <span style={{fontSize:10,color:'var(--text-muted)',transition:'transform 0.2s',transform:expanded?'rotate(90deg)':'rotate(0deg)',display:'inline-block'}}>▶</span>}
              <span className="badge" style={{background:typeColors[node.type]+'20',color:typeColors[node.type],fontSize:10}}>{node.type}</span>
              <span className="mono" style={{fontSize:12}}>{node.id}</span>
            </div>
            <span className={`badge ${node.status==='completed'?'badge-green':node.status==='failed'?'badge-red':node.status==='pending'?'badge-yellow':'badge-gray'}`}>{node.status}</span>
          </div>
          {expanded && node.props && (
            <div style={{marginTop:6,display:'flex',gap:12,flexWrap:'wrap'}}>
              {Object.entries(node.props).map(([k,v]) => (
                <span key={k} style={{fontSize:11,color:'var(--text-muted)'}}><strong>{k}:</strong> <span className="mono">{String(v)}</span></span>
              ))}
            </div>
          )}
        </div>
        {expanded && hasChildren && (
          <div className="cg-children">
            {node.children.map(c => <TreeNode key={c.id} node={c} depth={depth+1}/>)}
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{maxWidth:1200,margin:'0 auto'}}>
      <div className="card fade-in" style={{marginBottom:24}}>
        <div className="card-header"><h3>Session Search</h3></div>
        <div className="card-body">
          <div className="input-group">
            <input className="input" value={searchId} onChange={e=>setSearchId(e.target.value)} placeholder="Enter session ID, user ID, or date range..." onKeyDown={e=>e.key==='Enter'&&handleSearch()} disabled={searching} />
            <button className="btn btn-primary" onClick={handleSearch} disabled={searching}>
              {searching ? <span className="loading-spinner" style={{width:14,height:14,borderWidth:2}}/> : <Icon name="search" size={16}/>} Search
            </button>
          </div>
          {searchError && (
            <div style={{marginTop:12,padding:'10px 14px',background:'var(--warning-light)',borderRadius:'var(--radius-sm)',fontSize:13,color:'#92400E',lineHeight:1.5}}>
              {searchError}
            </div>
          )}
        </div>
      </div>

      {followUpChain.length > 0 && (
        <>
          <div className="card fade-in" style={{marginBottom:24}}>
            <div className="card-header">
              <h3>Follow-Up Chain ({followUpChain.length} sessions)</h3>
              <div style={{display:'flex',gap:4}}>
                <button className="btn btn-secondary btn-sm" onClick={()=>scrollChain(-1)} disabled={currentIndex<=0} style={{padding:'4px 8px',opacity:currentIndex<=0?0.4:1}}>←</button>
                <button className="btn btn-secondary btn-sm" onClick={()=>scrollChain(1)} disabled={currentIndex>=followUpChain.length-1} style={{padding:'4px 8px',opacity:currentIndex>=followUpChain.length-1?0.4:1}}>→</button>
              </div>
            </div>
            <div className="card-body" style={{padding:'12px 20px'}}>
              <div ref={chainScrollRef} style={{display:'flex',alignItems:'stretch',gap:0,overflowX:'auto',scrollBehavior:'smooth',paddingBottom:8,scrollbarWidth:'thin'}}>
                {followUpChain.map((s,i) => {
                  const isSelected = s.id === selectedSession;
                  const tree = cgTrees[s.id];
                  const isFailed = tree?.status === 'failed' || tree?.children?.[0]?.status === 'failed';
                  return (
                    <React.Fragment key={s.id}>
                      {i > 0 && (
                        <div style={{display:'flex',alignItems:'center',flexShrink:0}}>
                          <div style={{width:32,height:2,background:isFailed?'var(--error)':'var(--accent)'}}/>
                          <div style={{width:0,height:0,borderTop:'5px solid transparent',borderBottom:'5px solid transparent',borderLeft:`6px solid ${isFailed?'var(--error)':'var(--accent)'}`}}/>
                        </div>
                      )}
                      <div id={`chain-${s.id}`}
                        onClick={()=>selectSession(s.id)}
                        style={{
                          padding:'12px 16px',minWidth:220,maxWidth:260,flexShrink:0,
                          border:isSelected?'2px solid var(--accent)':'1px solid var(--border)',
                          borderRadius:'var(--radius-sm)',cursor:'pointer',
                          background:isSelected?'var(--accent-light)':isFailed?'var(--error-light)':'white',
                          transition:'all 0.2s',
                          transform:isSelected?'scale(1.02)':'scale(1)',
                          boxShadow:isSelected?'var(--shadow-md)':'none',
                        }}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                          <span style={{fontSize:10,fontWeight:600,color:isSelected?'var(--accent-dark)':'var(--text-muted)',fontFamily:'var(--font-mono)'}}>Depth {s.depth}</span>
                          <span style={{fontSize:10,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>{s.timestamp}</span>
                        </div>
                        <div style={{fontSize:12,fontWeight:500,color:isSelected?'var(--accent-dark)':'var(--text-primary)',marginBottom:4,lineHeight:1.4}}>{s.query}</div>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                          <span className="mono" style={{fontSize:10,color:'var(--text-muted)'}}>{s.id}</span>
                          {isFailed && <span className="badge badge-red" style={{fontSize:9}}>failed</span>}
                        </div>
                      </div>
                    </React.Fragment>
                  );
                })}
              </div>
            </div>
          </div>

          {currentTree && (
            <div className="card fade-in" key={selectedSession}>
              <div className="card-header">
                <h3>Context Graph — {selectedSession}</h3>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <button className="btn btn-secondary btn-sm" onClick={()=>currentIndex>0&&selectSession(followUpChain[currentIndex-1].id)} disabled={currentIndex<=0}>← Previous</button>
                  <span style={{fontSize:12,color:'var(--text-muted)'}}>{currentIndex+1} of {followUpChain.length}</span>
                  <button className="btn btn-secondary btn-sm" onClick={()=>currentIndex<followUpChain.length-1&&selectSession(followUpChain[currentIndex+1].id)} disabled={currentIndex>=followUpChain.length-1}>Next →</button>
                </div>
              </div>
              <div className="card-body">
                {currentChainItem && (
                  <div style={{padding:'10px 14px',background:'var(--bg-secondary)',borderRadius:'var(--radius-sm)',marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                      <span style={{fontSize:12,color:'var(--text-muted)'}}>Query: </span>
                      <span style={{fontSize:13,fontWeight:500}}>{currentChainItem.query}</span>
                    </div>
                    <div style={{display:'flex',gap:12,alignItems:'center'}}>
                      <span className="mono" style={{fontSize:11,color:'var(--text-muted)'}}>chainDepth: {currentChainItem.depth} • rootSession: {followUpChain[0].id}</span>
                      {role === 'CSR_SUPERVISOR' && (
                        <span>
                          <a href="#" onClick={e=>{e.preventDefault();handleRemoveExperience(selectedSession);}} style={{fontSize:11,color:'var(--error)',textDecoration:'none',whiteSpace:'nowrap',opacity:removingExperience?0.5:1,pointerEvents:removingExperience?'none':'auto'}}>{removingExperience ? 'Removing…' : 'Remove from Experience Store'}</a>
                          {removeResult && <span style={{fontSize:11,marginLeft:6,color:removeResult.success?'var(--success)':'var(--error)'}}>{removeResult.msg}</span>}
                        </span>
                      )}
                    </div>
                  </div>
                )}
                <TreeNode node={currentTree}/>
              </div>
            </div>
          )}
        </>
      )}

      {followUpChain.length === 0 && (
        <div className="card"><div className="card-body"><div className="empty-state">
          <div className="empty-state-icon">🌐</div>
          <div className="empty-state-title">Search for a session</div>
          <div className="empty-state-desc">Enter a session ID to explore the full Context Graph execution tree, including follow-up session chains.</div>
        </div></div></div>
      )}
    </div>
  );
};

// FEEDBACK LEARNING DASHBOARD
// ═══════════════════════════════════════════════════════════════
const FeedbackDashboard = ({ token, role }) => {
  const [patterns, setPatterns] = useState([]);
  const [improvements, setImprovements] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [funnelData, setFunnelData] = useState([]);
  const [storeStats, setStoreStats] = useState([]);
  const [showLogForm, setShowLogForm] = useState(false);
  const [submittingLog, setSubmittingLog] = useState(false);
  const [logForm, setLogForm] = useState({change_type:'planning_rule',component:'',description:'',baseline_key:'',baseline_val:'',post_key:'',post_val:''});

  const handleLogSubmit = async () => {
    if (!logForm.component.trim() || !logForm.description.trim()) return;
    setSubmittingLog(true);
    try {
      const body = {
        change_type: logForm.change_type,
        component: logForm.component.trim(),
        description: logForm.description.trim(),
        baseline_metrics: logForm.baseline_key ? {[logForm.baseline_key.trim()]: logForm.baseline_val.trim()} : {},
        post_change_metrics: logForm.post_key ? {[logForm.post_key.trim()]: logForm.post_val.trim()} : {},
      };
      await apiCall('POST', '/api/feedback/improvements', body, token);
      setShowLogForm(false);
      setLogForm({change_type:'planning_rule',component:'',description:'',baseline_key:'',baseline_val:'',post_key:'',post_val:''});
      // Refresh improvements
      const imp = await apiCall('GET', '/api/feedback/improvements', null, token);
      setImprovements(imp);
    } catch (exc) {
      alert('Failed to log change: ' + (exc.message || exc));
    }
    setSubmittingLog(false);
  };

  // Demo data
  const demoFunnel = [
    { label:'Total Agent Invocations', value:5000, pct:100 },
    { label:'Positive Feedback Rate', value:'87.3%', pct:87 },
    { label:'Failure Classifications', value:142, pct:2.8 },
    { label:'Pattern Reports Generated', value:8, pct:0.16 },
    { label:'Experiences Extracted', value:23, pct:0.46 },
  ];
  const demoStore = [
    { label:'Total Experiences', value:'142', sub:'Chroma collection: successful_experiences' },
    { label:'Total Extracted', value:'23', sub:'From correct-rated sessions' },
    { label:'Hit Rate', value:'78%', sub:'Planning calls with ≥1 matching experience' },
    { label:'Collection', value:'active', sub:'successful_experiences' },
  ];

  useEffect(() => {
    (async () => {
      try {
        // Patterns and improvements from API (works in both modes via apiCall)
        const [p, imp] = await Promise.all([
          apiCall('GET', '/api/feedback/patterns', null, token),
          apiCall('GET', '/api/feedback/improvements', null, token),
        ]);
        setPatterns(p); setImprovements(imp);
      } catch(e) {}

      if (DEMO_MODE) {
        setFunnelData(demoFunnel);
        setStoreStats(demoStore);
      } else {
        // Funnel data from Prometheus counters
        // Available metrics: agent_invocations_total, csip_positive_feedback_rate,
        // csip_feedback_classifications_total, csip_experiences_extracted_total,
        // csip_pattern_reports_generated_total.
        // NOTE: There is no "total feedback submissions" counter — only the
        // positive_feedback_rate gauge (a ratio). We show what we CAN measure.
        try {
          // Get total agent invocations from CG (Prometheus counter is dead code)
          let total = 0;
          try {
            const teamResp = await apiCall('GET', '/api/stats/team-invocations', null, token);
            total = (teamResp.teams || []).reduce((sum, t) => sum + (t.count||0), 0);
          } catch(e) { /* fallback to 0 */ }
          const [fbRate, fbClassified, extractedTotal, patternReports] = await Promise.all([
            promQuery('csip_positive_feedback_rate'),
            promQuery('sum(csip_feedback_classifications_total)'),
            promQuery('sum(csip_experiences_extracted_total)'),
            promQuery('sum(csip_pattern_reports_generated_total)'),
          ]);
          const posRate = promValue(fbRate);
          const classified = Math.round(promValue(fbClassified));
          const extracted = Math.round(promValue(extractedTotal));
          const reports = Math.round(promValue(patternReports));
          const funnel = [
            { label:'Total Agent Invocations', value:total, pct:100 },
            { label:'Positive Feedback Rate', value:posRate > 0 ? (posRate*100).toFixed(1)+'%' : '--', pct:posRate > 0 ? Math.round(posRate*100) : 0 },
            { label:'Failure Classifications', value:classified, pct:total>0?Math.round(classified/total*1000)/10:0 },
            { label:'Pattern Reports Generated', value:reports, pct:total>0?Math.round(reports/total*1000)/10:0 },
            { label:'Experiences Extracted', value:extracted, pct:total>0?Math.round(extracted/total*1000)/10:0 },
          ];
          setFunnelData(funnel);
        } catch(e) { setFunnelData([]); }

        // Experience store stats from Prometheus
        try {
          const [storeSize, hitRate, extractedW] = await Promise.all([
            promQuery('csip_experience_store_size'),
            promQuery('csip_experience_hit_rate'),
            promQuery('csip_experiences_extracted_total'),
          ]);
          setStoreStats([
            { label:'Total Experiences', value:String(Math.round(promValue(storeSize))), sub:'Chroma collection: successful_experiences' },
            { label:'Total Extracted', value:String(Math.round(promValue(extractedW))), sub:'From correct-rated sessions' },
            { label:'Hit Rate', value:promValue(hitRate) > 0 ? Math.round(promValue(hitRate)*100)+'%' : '--', sub:'Planning calls with ≥1 matching experience' },
            { label:'Collection', value:'active', sub:'successful_experiences' },
          ]);
        } catch(e) { setStoreStats([]); }
      }

      setLoaded(true);
    })();
  }, [token]);

  return (
    <div style={{maxWidth:1200,margin:'0 auto'}}>
      <div className="card fade-in" style={{marginBottom:24}}>
        <div className="card-header"><h3>Feedback Funnel (live)</h3></div>
        <div className="card-body">
          {funnelData.length > 0 ? funnelData.map((d,i) => (
            <div className="funnel-step" key={d.label}>
              <div className="funnel-label">{d.label}</div>
              <div className="funnel-bar-outer">
                <div className="funnel-bar-inner" style={{width:`${Math.max(d.pct, (typeof d.value === 'number' ? d.value : 1) > 0?2:0)}%`,background: i===0?'var(--accent)':i<3?'#38BDF8':i<4?'var(--warning)':'var(--success)'}}>{typeof d.value === 'number' ? d.value.toLocaleString() : d.value}</div>
              </div>
              <div className="funnel-value">{d.pct}%</div>
            </div>
          )) : !loaded ? <div style={{textAlign:'center',padding:24}}><span className="loading-spinner"/></div> : <div className="empty-state" style={{padding:24}}><div className="empty-state-desc">No funnel data available yet. Submit some queries and feedback first.</div></div>}
        </div>
      </div>

      <div className="grid-2" style={{marginBottom:24}}>
        <div className="card fade-in">
          <div className="card-header"><h3>Failure Pattern Clusters</h3>
            <span className="badge badge-blue">{patterns.length} active</span>
          </div>
          <div className="card-body">
            {!loaded ? <div style={{textAlign:'center',padding:24}}><span className="loading-spinner"/></div> :
            patterns.length === 0 ? <div className="empty-state" style={{padding:24}}><div className="empty-state-desc">No patterns detected yet.</div></div> :
            patterns.map(p => (
              <div key={p.report_id} style={{padding:14,border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <div style={{display:'flex',gap:6,alignItems:'center'}}>
                    <span className="badge badge-red">{p.classification_type}</span>
                    <span className="badge badge-gray">{p.team.replace('_team','').replace('_services','')}</span>
                  </div>
                  <span className={`badge ${p.status==='new'?'badge-yellow':p.status==='acknowledged'?'badge-blue':'badge-green'}`}>{p.status}</span>
                </div>
                <div style={{fontSize:13,fontWeight:500,marginBottom:4}}>{p.cluster_count} similar failures</div>
                <div style={{fontSize:12,color:'var(--text-secondary)',lineHeight:1.5}}>{p.suggested_action}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="card fade-in">
          <div className="card-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <h3>Improvement Timeline</h3>
            {role === 'CSR_SUPERVISOR' && (
              <button className="btn btn-secondary btn-sm" onClick={()=>setShowLogForm(!showLogForm)}>{showLogForm ? 'Cancel' : '+ Log Change'}</button>
            )}
          </div>
          {showLogForm && (
            <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)',background:'var(--bg-secondary)'}}>
              <div style={{display:'flex',gap:10,marginBottom:10,flexWrap:'wrap'}}>
                <select className="input" style={{width:160}} value={logForm.change_type} onChange={e=>setLogForm({...logForm,change_type:e.target.value})}>
                  <option value="planning_rule">Planning Rule</option>
                  <option value="routing_rule">Routing Rule</option>
                  <option value="agent_card">Agent Card</option>
                  <option value="retrieval_update">Retrieval Update</option>
                </select>
                <input className="input" style={{flex:1,minWidth:160}} placeholder="Component (e.g. central_supervisor)" value={logForm.component} onChange={e=>setLogForm({...logForm,component:e.target.value})}/>
              </div>
              <input className="input" style={{width:'100%',marginBottom:10}} placeholder="Description of the change" value={logForm.description} onChange={e=>setLogForm({...logForm,description:e.target.value})}/>
              <div style={{display:'flex',gap:10,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
                <span style={{fontSize:12,color:'var(--text-muted)',minWidth:55}}>Baseline:</span>
                <input className="input" style={{width:120}} placeholder="Metric name" value={logForm.baseline_key} onChange={e=>setLogForm({...logForm,baseline_key:e.target.value})}/>
                <input className="input" style={{width:80}} placeholder="Value" value={logForm.baseline_val} onChange={e=>setLogForm({...logForm,baseline_val:e.target.value})}/>
                <span style={{fontSize:12,color:'var(--text-muted)',minWidth:35}}>Post:</span>
                <input className="input" style={{width:120}} placeholder="Metric name" value={logForm.post_key} onChange={e=>setLogForm({...logForm,post_key:e.target.value})}/>
                <input className="input" style={{width:80}} placeholder="Value" value={logForm.post_val} onChange={e=>setLogForm({...logForm,post_val:e.target.value})}/>
              </div>
              <button className="btn btn-primary btn-sm" onClick={handleLogSubmit} disabled={submittingLog || !logForm.component.trim() || !logForm.description.trim()}>{submittingLog ? 'Saving…' : 'Save Change'}</button>
            </div>
          )}
          <div className="card-body">
            {!loaded ? <div style={{textAlign:'center',padding:24}}><span className="loading-spinner"/></div> :
            improvements.length === 0 ? <div className="empty-state" style={{padding:24}}><div className="empty-state-desc">No improvements logged yet.</div></div> :
            improvements.map(imp => {
              let baseline, post;
              try { baseline = JSON.parse(imp.baseline_metrics); post = JSON.parse(imp.post_change_metrics); } catch(e) { baseline={}; post={}; }
              return (
                <div key={imp.change_id} style={{padding:14,border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',marginBottom:10,borderLeft:'3px solid var(--success)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <span className="badge badge-green">{imp.change_type}</span>
                    <span style={{fontSize:11,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>{new Date(imp.change_timestamp).toLocaleDateString()}</span>
                  </div>
                  <div style={{fontSize:13,fontWeight:500,marginBottom:4}}>{imp.description}</div>
                  <div style={{fontSize:12,color:'var(--text-muted)'}}>Component: {imp.component} • By: {imp.changed_by}</div>
                  {Object.keys(baseline).length > 0 && (
                    <div style={{display:'flex',gap:16,marginTop:8}}>
                      {Object.keys(baseline).map(k => (
                        <div key={k} style={{fontSize:12}}>
                          <span style={{color:'var(--text-muted)'}}>{k}: </span>
                          <span style={{color:'var(--error)',textDecoration:'line-through'}}>{baseline[k]}</span>
                          <span> → </span>
                          <span style={{color:'var(--success)',fontWeight:600}}>{post[k]}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div className="card fade-in">
        <div className="card-header"><h3>Experience Store Status (live)</h3></div>
        <div className="card-body">
          <div style={{display:'flex',gap:32,flexWrap:'wrap'}}>
            {storeStats.length > 0 ? storeStats.map(s => (
              <div key={s.label}>
                <div style={{fontSize:24,fontWeight:700,fontFamily:'var(--font-mono)',color:'var(--text-primary)'}}>{s.value}</div>
                <div style={{fontSize:13,fontWeight:500,marginTop:2}}>{s.label}</div>
                <div style={{fontSize:11,color:'var(--text-muted)'}}>{s.sub}</div>
              </div>
            )) : !loaded ? <span className="loading-spinner"/> : <div className="empty-state" style={{padding:16}}><div className="empty-state-desc">Experience store metrics not available yet.</div></div>}
          </div>
        </div>
      </div>
    </div>
  );
};
