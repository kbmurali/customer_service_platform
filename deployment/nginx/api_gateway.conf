        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Client-DN       $ssl_client_s_dn;
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ── Claims Services MCP tools ──
    location /mcp/claims/ {
        # Variable forces Nginx to use the resolver at request time
        set $upstream_member http://claims-services-mcp-tools:8001;
        rewrite ^/mcp/claims/(.*)$ /$1 break;
        proxy_pass         $upstream_member;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Client-DN       $ssl_client_s_dn;
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ── Claims Services Supervisor (A2A) ──
