# ── Plain HTTP server for internal Swarm healthcheck only ──
server {
    listen 8080;
    server_name localhost;

    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 444;
    }
}