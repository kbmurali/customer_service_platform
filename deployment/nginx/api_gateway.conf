
# ── Agentic Access HTTP API — HTTPS only (no mTLS) ────────────────────────
# External users connect here via standard HTTPS on port 443.
# No client certificate is required — authentication is handled by the
# FastAPI JWT bearer token layer inside the agentic-access-api service.
# mTLS is intentionally not enforced here; it is only required for
# internal service-to-service communication on port 8443.
server {
    listen 443 ssl;
    server_name api-gateway;

    # Docker internal DNS resolver — needed for dynamic upstream variables
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Server certificate (same cert as port 8443) ──
    ssl_certificate     /run/secrets/MCP_SERVER_CERT;
    ssl_certificate_key /run/secrets/MCP_SERVER_KEY;

    # ── TLS hardening (no ssl_verify_client — HTTPS only) ──
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Agentic Access API ──
    location /agentic/access {
        set $upstream_agentic http://agentic-access-api:8000;
        rewrite ^/agentic/access/(.*)$ /$1 break;
        proxy_pass         $upstream_agentic;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ── A2A Agent Cards — HTTPS only, no mTLS required ────────────────────
    # The central supervisor fetches /.well-known/agent.json without a
    # client certificate. These locations proxy the same A2A servers as
    # port 8443 but without ssl_verify_client, so agent card discovery
    # succeeds and eliminates the 400 Bad Request warnings at startup.
    location /a2a/member/.well-known/ {
        set $upstream_ac_member http://member-services-a2a-server:8101;
        rewrite ^/a2a/member/(.*)$ /$1 break;
        proxy_pass         $upstream_ac_member;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;
    }

    location /a2a/claims/.well-known/ {
        set $upstream_ac_claims http://claims-services-a2a-server:8101;
        rewrite ^/a2a/claims/(.*)$ /$1 break;
        proxy_pass         $upstream_ac_claims;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;
    }

    location /a2a/pa/.well-known/ {
        set $upstream_ac_pa http://pa-services-a2a-server:8101;
        rewrite ^/a2a/pa/(.*)$ /$1 break;
        proxy_pass         $upstream_ac_pa;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;
    }

    location /a2a/provider/.well-known/ {
        set $upstream_ac_provider http://provider-services-a2a-server:8101;
        rewrite ^/a2a/provider/(.*)$ /$1 break;
        proxy_pass         $upstream_ac_provider;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;
    }

    location /a2a/search/.well-known/ {
        set $upstream_ac_search http://search-services-a2a-server:8101;
        rewrite ^/a2a/search/(.*)$ /$1 break;
        proxy_pass         $upstream_ac_search;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;
    }
}

# ── API Gateway — mTLS reverse proxy ─────────────────────────────────────

# Use Docker's internal DNS resolver (127.0.0.11) for dynamic upstream resolution.
# Note: resolver directive is shared across all server blocks in this config.
# This defers hostname lookup to request time rather than startup,
# so Nginx starts even if upstream services aren't running yet.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 8443 ssl;
    server_name api-gateway;

    # ── Server certificate (Swarm secret, auto-mounted at /run/secrets/) ──
    ssl_certificate     /run/secrets/MCP_SERVER_CERT;
    ssl_certificate_key /run/secrets/MCP_SERVER_KEY;

    # ── mTLS: require and verify client certificate ──
    ssl_client_certificate /run/secrets/MCP_CA_CERT;
    ssl_verify_client      on;

    # ── TLS hardening ──
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Member Services MCP tools ──
    location /mcp/member/ {
        # Variable forces Nginx to use the resolver at request time
        set $upstream_member http://member-services-mcp-tools:8001;
        rewrite ^/mcp/member/(.*)$ /$1 break;
        proxy_pass         $upstream_member;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Client-DN       $ssl_client_s_dn;
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ── Member Services Supervisor (A2A) ──
    location /a2a/member/ {
        set $upstream_sup_member http://member-services-a2a-server:8101;
        rewrite ^/a2a/member/(.*)$ /$1 break;
        proxy_pass         $upstream_sup_member;
