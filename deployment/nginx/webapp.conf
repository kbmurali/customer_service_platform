# =============================================================================
# CSIP Web Application — Nginx Configuration
# =============================================================================
# Serves the single-page React application and proxies API calls to the
# backend services running on the Docker Swarm overlay network.
#
# Routing:
#   /                         → SPA (index.html)
#   /agentic/access/api/*     → agentic-access-api:8000 (agent queries, auth, feedback)
#   /prometheus/api/*          → prometheus:9090 (metrics for dashboard)
#   /health                    → local 200 (container health check)
#
# IMPORTANT: Upstream hostnames are stored in variables so that Nginx
# resolves them at request time (via Docker's embedded DNS at 127.0.0.11)
# rather than at startup. When proxy_pass uses a variable, Nginx does NOT
# strip the location prefix automatically — rewrite rules handle this.
# =============================================================================

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker Swarm embedded DNS resolver — required for runtime resolution
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip compression ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # ── Health check endpoint (used by Docker Swarm) ─────────────────
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"healthy"}';
    }

    # ── Agentic Access API proxy ─────────────────────────────────────
    # Routes all API calls to the backend agentic-access-api service.
    # rewrite strips /agentic/access/ prefix since proxy_pass with a
    # variable does not perform URI replacement automatically.
    location /agentic/access/ {
        set $upstream_api http://agentic-access-api:8000;
        rewrite ^/agentic/access/(.*)$ /$1 break;
        proxy_pass         $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # First query has cold-start overhead (LLM providers, MCP clients,
        # NeMo guardrails, A2A encryption) — can exceed 60s easily.
        proxy_read_timeout    300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;

        # Disable buffering for streaming responses (future SSE support)
        proxy_buffering off;
    }

    # ── Prometheus API proxy ─────────────────────────────────────────
    # Used by the Performance Dashboard to query metrics directly.
    location /prometheus/ {
        set $upstream_prom http://prometheus:9090;
        rewrite ^/prometheus/(.*)$ /$1 break;
        proxy_pass         $upstream_prom;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 15s;
    }

    # ── Static assets with caching ───────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback ─────────────────────────────────────────────────
    # All other requests serve index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Logging ──────────────────────────────────────────────────────
    access_log /var/log/nginx/webapp_access.log;
    error_log  /var/log/nginx/webapp_error.log warn;
}
