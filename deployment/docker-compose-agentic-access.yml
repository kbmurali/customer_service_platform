services:
  agentic-access-api:
    image: csip/agentic-access-api:latest
    # No host ports — all external access goes through api-gateway on port 8443
    secrets:
      - LANGFUSE_SECRET_KEY
      - LANGFUSE_PUBLIC_KEY
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - MYSQL_PASSWORD
      - NEO4J_KG_PASSWORD
      - NEO4J_CG_PASSWORD
      - SECRET_KEY
      - VAULT_ENCRYPTION_KEY
      - MCP_CLIENT_CERT
      - MCP_CLIENT_KEY
      - MCP_CA_CERT
      - MCP_MASTER_SECRET
      - CLICKHOUSE_PASSWORD
    entrypoint:
      - /bin/sh
      - -lc
      - |
        export LANGFUSE_SECRET_KEY="$$(cat /run/secrets/LANGFUSE_SECRET_KEY)"
        export LANGFUSE_PUBLIC_KEY="$$(cat /run/secrets/LANGFUSE_PUBLIC_KEY)"
        export OPENAI_API_KEY="$$(cat /run/secrets/OPENAI_API_KEY)"
        export CHROMA_OPENAI_API_KEY="$$OPENAI_API_KEY"
        export ANTHROPIC_API_KEY="$$(cat /run/secrets/ANTHROPIC_API_KEY)"
        export AWS_ACCESS_KEY_ID="$$(cat /run/secrets/AWS_ACCESS_KEY_ID)"
        export AWS_SECRET_ACCESS_KEY="$$(cat /run/secrets/AWS_SECRET_ACCESS_KEY)"
        export MYSQL_PASSWORD="$$(cat /run/secrets/MYSQL_PASSWORD)"
        export NEO4J_KG_PASSWORD="$$(cat /run/secrets/NEO4J_KG_PASSWORD)"
        export NEO4J_CG_PASSWORD="$$(cat /run/secrets/NEO4J_CG_PASSWORD)"
        export SECRET_KEY="$$(cat /run/secrets/SECRET_KEY)"
        export VAULT_ENCRYPTION_KEY="$$(cat /run/secrets/VAULT_ENCRYPTION_KEY)"
        export MCP_MASTER_SECRET="$$(cat /run/secrets/MCP_MASTER_SECRET)"
        export CLICKHOUSE_PASSWORD="$$(cat /run/secrets/CLICKHOUSE_PASSWORD)"
        exec python -m uvicorn \
          agents.agentic_access_http_api:app \
          --host 0.0.0.0 \
          --port 8000 \
          --workers 1 \
          --loop asyncio
    environment:
      # ── Application ──
      APP_ENV: production
      # ── LLM Provider (switch between openai / anthropic / bedrock) ──
      LLM_PROVIDER: "openai"
      LLM_MODEL: "gpt-4o"
      AWS_REGION: "us-east-1"    # Required for bedrock; ignored by openai/anthropic
      LOG_LEVEL: INFO
      PYTHONPATH: /app
      # ── API Server ──
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      # ── Experience Store ──
      EXPERIENCE_STORE_ENABLED: "True"
      # ── mTLS (central supervisor → remote team A2A servers) ──
      MCP_CLIENT_CERT: "/run/secrets/MCP_CLIENT_CERT"
      MCP_CLIENT_KEY: "/run/secrets/MCP_CLIENT_KEY"
      MCP_CA_CERT: "/run/secrets/MCP_CA_CERT"
      # ── Remote team A2A URLs (all routed through api-gateway) ──
      A2A_MEMBER_SERVICES_URL: "https://api-gateway:8443/a2a/member"
      A2A_CLAIMS_SERVICES_URL: "https://api-gateway:8443/a2a/claims"
      A2A_PA_SERVICES_URL: "https://api-gateway:8443/a2a/pa"
      A2A_PROVIDER_SERVICES_URL: "https://api-gateway:8443/a2a/provider"
      A2A_SEARCH_SERVICES_URL: "https://api-gateway:8443/a2a/search"
      # ── MySQL ──
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: app_user
      MYSQL_DATABASE: health_insurance
      # ── Neo4j Knowledge Graph ──
      NEO4J_KG_URI: bolt://neo4j-kg:7687
      NEO4J_KG_USER: neo4j
      NEO4J_KG_DATABASE: neo4j
      # ── Neo4j Context Graph ──
      NEO4J_CG_URI: bolt://neo4j-cg:7687
      NEO4J_CG_USER: neo4j
      NEO4J_CG_DATABASE: neo4j
      # ── ChromaDB ──
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      # ── Redis (Circuit Breaker / Vault) ──
      REDIS_HOST: cb-hitl-redis
      REDIS_PORT: "6379"
      REDIS_VAULT_DB: "2"
      # ── ClickHouse (DLP scanner audit logging) ──
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_USER: "langfuse"
    networks:
      - health_insurance_health-insurance-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 20s
      retries: 10
      # Generous start period — CentralSupervisor initialises A2AClientNodes,
      # attempts live agent card fetches, loads the LLM provider, and
      # connects to Neo4j/MySQL/Chroma all on first request.
      start_period: 360s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          # Higher memory ceiling than team services — this service loads
          # NeMo Guardrails, Presidio (spaCy en_core_web_lg), Guardrails AI,
          # and the DLP scanner all in the same process.
          memory: 4G

networks:
  health_insurance_health-insurance-network:
    external: true

# ============================================
# Secrets (Docker Swarm external secrets)
# ============================================
secrets:
  NEO4J_KG_PASSWORD:
    external: true
  NEO4J_CG_PASSWORD:
    external: true
  MYSQL_PASSWORD:
    external: true
  LANGFUSE_SECRET_KEY:
    external: true
  LANGFUSE_PUBLIC_KEY:
    external: true
  SECRET_KEY:
    external: true
  AWS_ACCESS_KEY_ID:
    external: true
  AWS_SECRET_ACCESS_KEY:
    external: true
  OPENAI_API_KEY:
    external: true
  ANTHROPIC_API_KEY:
    external: true
  VAULT_ENCRYPTION_KEY:
    external: true
  MCP_CLIENT_CERT:
    external: true
  MCP_CLIENT_KEY:
    external: true
  MCP_CA_CERT:
    external: true
  MCP_MASTER_SECRET:
    external: true
  CLICKHOUSE_PASSWORD:
    external: true
